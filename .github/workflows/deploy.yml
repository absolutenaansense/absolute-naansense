name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; let an in-progress run finish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Served at an apex custom domain, so base is root.
      - name: Build
        run: npm run build -- --base=/

      # Per-repo custom domain: this same codebase lives in two repos.
      #   absolutenaansense        -> absolutenaansense.com (customers)
      #   absolutenaansense-in     -> absolutenaansense.in  (staff / backend)
      - name: Add CNAME for this repo's domain
        run: |
          if [ "${{ github.repository }}" = "absolutenaansense/absolutenaansense-in" ]; then
            echo "absolutenaansense.in" > dist/CNAME
          else
            echo "absolutenaansense.com" > dist/CNAME
          fi

      # SPA fallback: GitHub Pages serves 404.html for unknown paths,
      # so deep links / refreshes boot the app and React Router takes over.
      - name: Add SPA 404 fallback
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
