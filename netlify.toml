[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"
  # Skip build if only non-frontend files changed (saves credits)
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- . ':!../README.md' ':!../*.md' ':!../supabase'"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
